name: Lint

on:
    push:
        branches: [main]
        paths:
            - '.github/workflows/**'
            - 'scripts/**'
    pull_request:
        paths:
            - '.github/workflows/**'
            - 'scripts/**'

jobs:
    actionlint:
        name: actionlint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Download actionlint
              id: get_actionlint
              # actionlint v1.7.12
              run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/914e7df21a07ef503a81201c76d2b11c789d3fca/scripts/download-actionlint.bash)
              shell: bash
            - name: Check workflow files
              run: ${{ steps.get_actionlint.outputs.executable }} -color
              shell: bash

    shellcheck:
        name: shellcheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Check shell scripts
              # shellcheck is preinstalled on ubuntu-latest
              run: shellcheck --severity=warning scripts/*.sh
              shell: bash
