name: Dependabot auto-merge

on:
    workflow_call:
        secrets:
            token:
                description: 'Token with security-events: read for the Dependabot alerts API. Pass a PAT or fine-grained token when GITHUB_TOKEN lacks access (e.g. in orgs with restricted default permissions). Defaults to GITHUB_TOKEN.'
                required: false
        inputs:
            event-name:
                description: 'Pass github.event_name from the caller workflow so jobs can route correctly.'
                type: string
                required: true
            cvss-threshold:
                description: 'Minimum CVSS score to qualify for auto-merge (Gate 2). Float string, e.g. "7.0".'
                type: string
                default: '7.0'
            compatibility-threshold:
                description: 'Minimum Dependabot compatibility score % for direct dependencies (Gate 3).'
                type: number
                default: 80
            age-days:
                description: 'Minimum days a PR must be open before the scheduled job merges it.'
                type: number
                default: 7
            merge-method:
                description: 'Merge strategy passed to gh pr merge: squash, merge, or rebase.'
                type: string
                default: 'squash'
            fast-track-label:
                description: 'Label that bypasses all gates and enables immediate auto-merge.'
                type: string
                default: 'security-fast-track'
            review-label:
                description: 'Label applied to PRs that fail a gate and need human review.'
                type: string
                default: 'sirt-review-required'
            pending-label:
                description: 'Label applied to PRs that passed all gates and are awaiting the age gate.'
                type: string
                default: 'auto-merge-pending'
            review-team:
                description: 'Optional GitHub team slug (org/team) to @-mention in review-required comments.'
                type: string
                default: ''

permissions:
    pull-requests: write
    contents: write
    security-events: read

jobs:
    # Verifies the repo is actually configured for auto-merge before either
    # merge path runs. `gh pr merge --auto` fails (or silently never queues)
    # when "Allow auto-merge" is off or the default branch has no required
    # status checks — fail fast here with actionable errors instead.
    preflight:
        name: Preflight — repo auto-merge configuration
        runs-on: ubuntu-latest
        if: |
            inputs.event-name == 'schedule' ||
            (inputs.event-name == 'pull_request_target' && github.event.pull_request.user.login == 'dependabot[bot]')
        steps:
            - name: Check auto-merge setting and required status checks
              run: |
                  FAIL=0
                  DOCS="https://github.com/Automattic/dependabot-auto-merge-action#usage"

                  # --- Check 1: "Allow auto-merge" repo setting ---------------
                  # allow_auto_merge is only returned to tokens with push
                  # access, so distinguish false (misconfigured) from absent
                  # (unverifiable). The same call yields the default branch.
                  if ! REPO_JSON=$(gh api "repos/$GITHUB_REPOSITORY" 2>&1); then
                      echo "::error::Preflight: cannot read repository metadata — $(echo "$REPO_JSON" | head -c 300 | tr '\n' ' ')"
                      exit 1
                  fi

                  ALLOW_AUTO_MERGE=$(echo "$REPO_JSON" | jq -r 'if .allow_auto_merge == true then "true" elif .allow_auto_merge == false then "false" else "unknown" end')
                  DEFAULT_BRANCH=$(echo "$REPO_JSON" | jq -r '.default_branch')

                  case "$ALLOW_AUTO_MERGE" in
                      true)
                          echo "OK: 'Allow auto-merge' is enabled on $GITHUB_REPOSITORY."
                          ;;
                      false)
                          echo "::error::Preflight: 'Allow auto-merge' is disabled on $GITHUB_REPOSITORY, so gh pr merge --auto cannot work. Enable it under Settings → General → Pull Requests → Allow auto-merge. Setup docs: $DOCS (section '3. Enable auto-merge on the repo')."
                          FAIL=1
                          ;;
                      *)
                          echo "::warning::Preflight: this token cannot see the 'Allow auto-merge' setting (requires push access) — skipping the check. If auto-merge fails later, verify Settings → General → Pull Requests → Allow auto-merge."
                          ;;
                  esac

                  # --- Check 2: required status checks on the default branch --
                  # Rulesets are readable with contents: read — the recommended
                  # path — so they are checked first.
                  ENC_BRANCH=$(printf '%s' "$DEFAULT_BRANCH" | jq -sRr '@uri')

                  RULESET_CHECKS=0
                  if RULES_JSON=$(gh api "repos/$GITHUB_REPOSITORY/rules/branches/$ENC_BRANCH?per_page=100" 2>&1); then
                      RULESET_CHECKS=$(echo "$RULES_JSON" | jq '[.[] | select(.type == "required_status_checks")] | length' 2>/dev/null || echo 0)
                  else
                      echo "::warning::Preflight: could not read branch rulesets — $(echo "$RULES_JSON" | head -c 300 | tr '\n' ' '). Falling back to classic branch protection check."
                  fi

                  if [ "$RULESET_CHECKS" -gt 0 ]; then
                      echo "OK: default branch '$DEFAULT_BRANCH' has $RULESET_CHECKS ruleset-based required status check rule(s)."
                  else
                      # No ruleset checks — check classic branch protection.
                      # .protected is readable without admin; the /protection
                      # detail endpoint is admin-only, so an error there while
                      # the branch IS protected means "cannot verify checks",
                      # not "no checks" → warn and continue.
                      if BRANCH_JSON=$(gh api "repos/$GITHUB_REPOSITORY/branches/$ENC_BRANCH" 2>&1); then
                          PROTECTED=$(echo "$BRANCH_JSON" | jq -r '.protected // false')
                      else
                          echo "::warning::Preflight: could not read default branch info — $(echo "$BRANCH_JSON" | head -c 300 | tr '\n' ' '). Skipping the required status checks verification."
                          PROTECTED="unknown"
                      fi

                      if [ "$PROTECTED" = "true" ]; then
                          if PROT_JSON=$(gh api "repos/$GITHUB_REPOSITORY/branches/$ENC_BRANCH/protection" 2>&1); then
                              HAS_CHECKS=$(echo "$PROT_JSON" | jq '.required_status_checks != null')
                              if [ "$HAS_CHECKS" = "true" ]; then
                                  echo "OK: classic branch protection on '$DEFAULT_BRANCH' requires status checks."
                              else
                                  echo "::error::Preflight: branch protection on '$DEFAULT_BRANCH' has no required status checks, so GitHub will never queue an auto-merge. Add at least one required status check via a ruleset (Settings → Rules → Rulesets) or the branch protection rule (Settings → Branches). Setup docs: $DOCS (section '4. Branch protection')."
                                  FAIL=1
                              fi
                          else
                              echo "::warning::Preflight: '$DEFAULT_BRANCH' has classic branch protection, but this token cannot read its details (endpoint requires admin). Assuming required status checks are configured — auto-merge will fail later if they are not. Consider migrating to rulesets, which this check can verify."
                          fi
                      elif [ "$PROTECTED" = "false" ]; then
                          echo "::error::Preflight: default branch '$DEFAULT_BRANCH' has no ruleset-based required status checks and no classic branch protection rule. gh pr merge --auto needs at least one required status check to queue against. Add one via a ruleset (Settings → Rules → Rulesets, recommended) or classic branch protection (Settings → Branches). Setup docs: $DOCS (section '4. Branch protection')."
                          FAIL=1
                      fi
                  fi

                  exit "$FAIL"
              env:
                  GH_TOKEN: ${{ github.token }}

    # Runs on every Dependabot PR event. Checks eligibility gates and labels
    # the PR accordingly. The age gate is handled by the scheduled job below.
    evaluate-pr:
        name: Evaluate security PR eligibility
        runs-on: ubuntu-latest
        needs: preflight
        if: inputs.event-name == 'pull_request_target' && github.event.pull_request.user.login == 'dependabot[bot]'
        steps:
            - uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
              id: meta

            # Human override: a reviewer has verified this is a legitimate security
            # fix. Bypass all automated gates and enable auto-merge immediately.
            - name: Fast-track — human-verified override (bypasses all gates)
              id: fast-track
              if: contains(github.event.pull_request.labels.*.name, inputs.fast-track-label)
              run: |
                  gh pr merge --auto --"$MERGE_METHOD" "$PR_URL"
              env:
                  MERGE_METHOD: ${{ inputs.merge-method }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # Audit trail: the fast-track path enables auto-merge silently, so
            # record who applied the label, when, and the workflow run on the PR.
            # The hidden marker makes this exactly-once: repeated synchronize
            # events find it in an existing comment and skip.
            - name: Fast-track — post audit comment (once)
              if: steps.fast-track.conclusion == 'success'
              run: |
                  MARKER='<!-- dependabot-auto-merge:fast-track-audit -->'

                  if gh api --paginate "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments?per_page=100" \
                      --jq '.[].body' | grep -qF "$MARKER"; then
                      echo "Fast-track audit comment already exists — skipping."
                      exit 0
                  fi

                  if [ "$EVENT_ACTION" = "labeled" ] && [ "$LABEL_NAME" = "$FAST_TRACK_LABEL" ]; then
                      APPLIED_BY="@$SENDER"
                  else
                      APPLIED_BY="not recorded — the label was already present when this $EVENT_ACTION event ran"
                  fi

                  TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

                  BODY=$(cat <<EOF
                  $MARKER
                  **Fast-track audit** — auto-merge was enabled on this PR via the **$FAST_TRACK_LABEL** label, bypassing all gates.

                  - **Label applied by:** $APPLIED_BY
                  - **When (UTC):** $TIMESTAMP
                  - **Workflow run:** $RUN_URL
                  EOF
                  )

                  gh pr comment "$PR_URL" --body "$BODY"
              env:
                  EVENT_ACTION: ${{ github.event.action }}
                  LABEL_NAME: ${{ github.event.label.name }}
                  SENDER: ${{ github.event.sender.login }}
                  FAST_TRACK_LABEL: ${{ inputs.fast-track-label }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # Gate 1: must be a security advisory, not a routine version bump.
            # fetch-metadata only embeds ghsa-id for direct-dependency security
            # update PRs, so indirect deps always come through empty here.
            - name: Gate 1 — security advisory check
              id: gate1
              if: steps.fast-track.conclusion == 'skipped'
              run: |
                  if [ -z "$GHSA_ID" ]; then
                      echo "pass=false" >> "$GITHUB_OUTPUT"
                      echo "No GHSA ID from PR metadata — checking Dependabot alerts API."
                  else
                      echo "pass=true" >> "$GITHUB_OUTPUT"
                      echo "cvss=$CVSS" >> "$GITHUB_OUTPUT"
                  fi
              env:
                  GHSA_ID: ${{ steps.meta.outputs.ghsa-id }}
                  CVSS: ${{ steps.meta.outputs.cvss }}

            # Gate 1 fallback: for indirect dependencies, fetch-metadata cannot embed
            # advisory data. Query the Dependabot alerts API directly and match open
            # alerts against the packages being updated.
            - name: Gate 1 fallback — Dependabot alerts API (indirect deps)
              id: gate1-fallback
              if: steps.fast-track.conclusion == 'skipped' && steps.gate1.outputs.pass == 'false'
              run: |
                  PKGS="$DEPENDENCY_NAMES"

                  # Split API call and jq into separate stages so each failure
                  # mode surfaces as a named warning rather than a silent exit-1.
                  if API_RESPONSE=$(gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/dependabot/alerts?state=open&per_page=100" 2>&1); then
                      RESULT=$(echo "$API_RESPONSE" | jq \
                          --arg pkgs "$PKGS" \
                          '[.[][] | select(.security_advisory.ghsa_id != null)
                           | select(.dependency.package.name as $n |
                               ($pkgs | split(", ") | index($n)) != null)]
                           | sort_by(-(.security_advisory.cvss.score // 0)) | first
                           | select(. != null)
                           | {ghsa: .security_advisory.ghsa_id,
                              cvss: (.security_advisory.cvss.score // 0)}' 2>&1) || {
                          echo "::warning::Gate 1 fallback: jq filter failed on Dependabot alerts response — treating as no advisory match."
                          RESULT=""
                      }
                  else
                      echo "::error::Gate 1 fallback: Dependabot alerts API call failed — $(echo "$API_RESPONSE" | head -c 300)"
                      exit 1
                  fi

                  if [ -z "$RESULT" ] || [ "$RESULT" = "null" ]; then
                      echo "pass=false" >> "$GITHUB_OUTPUT"
                      echo "cvss=0" >> "$GITHUB_OUTPUT"
                      echo "No matching open Dependabot alert found — routine version update."
                  else
                      GHSA=$(echo "$RESULT" | jq -r '.ghsa')
                      CVSS=$(echo "$RESULT" | jq -r '.cvss')
                      echo "pass=true" >> "$GITHUB_OUTPUT"
                      echo "cvss=$CVSS" >> "$GITHUB_OUTPUT"
                      echo "Advisory $GHSA (CVSS $CVSS) found via Dependabot alerts API."
                  fi
              env:
                  DEPENDENCY_NAMES: ${{ steps.meta.outputs.dependency-names }}
                  GH_TOKEN: ${{ secrets.token || github.token }}

            # Resolve the effective CVSS from whichever source succeeded.
            - name: Resolve effective CVSS
              id: cvss
              if: |
                  steps.fast-track.conclusion == 'skipped' &&
                  (steps.gate1.outputs.pass == 'true' || steps.gate1-fallback.outputs.pass == 'true')
              run: |
                  CVSS="$GATE1_CVSS"
                  [ -z "$CVSS" ] || [ "$CVSS" = "0" ] && CVSS="$GATE1_FALLBACK_CVSS"
                  echo "value=$CVSS" >> "$GITHUB_OUTPUT"
              env:
                  GATE1_CVSS: ${{ steps.gate1.outputs.cvss }}
                  GATE1_FALLBACK_CVSS: ${{ steps.gate1-fallback.outputs.cvss }}

            # Metadata check: fail closed if CVSS is still unavailable after both sources.
            - name: Verify advisory metadata is available
              id: metadata-check
              if: |
                  steps.fast-track.conclusion == 'skipped' &&
                  (steps.gate1.outputs.pass == 'true' || steps.gate1-fallback.outputs.pass == 'true')
              run: |
                  if [ -z "$CVSS" ] || [ "$CVSS" = "0" ]; then
                      echo "available=false" >> "$GITHUB_OUTPUT"
                      echo "CVSS unavailable — failing closed."
                  else
                      echo "available=true" >> "$GITHUB_OUTPUT"
                  fi
              env:
                  CVSS: ${{ steps.cvss.outputs.value }}

            # Gate 2: high or critical severity.
            - name: Gate 2 — severity check (CVSS ≥ ${{ inputs.cvss-threshold }})
              id: gate2
              if: |
                  steps.fast-track.conclusion == 'skipped' &&
                  steps.metadata-check.outputs.available == 'true'
              run: |
                  if (( $(echo "$CVSS >= $THRESHOLD" | bc -l) )); then
                      echo "pass=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "pass=false" >> "$GITHUB_OUTPUT"
                      echo "CVSS $CVSS is below the threshold of $THRESHOLD."
                  fi
              env:
                  CVSS: ${{ steps.cvss.outputs.value }}
                  THRESHOLD: ${{ inputs.cvss-threshold }}

            # Gate 3: compatibility score.
            # Skipped for indirect-dep PRs: fetch-metadata cannot provide a score
            # for transitive dependencies. The age gate provides the timing safeguard.
            - name: Gate 3 — compatibility score (≥ ${{ inputs.compatibility-threshold }}%)
              id: gate3
              if: |
                  steps.fast-track.conclusion == 'skipped' &&
                  steps.gate2.outputs.pass == 'true' &&
                  steps.gate1-fallback.outputs.pass != 'true' &&
                  steps.meta.outputs.compatibility-score != ''
              run: |
                  if [ "${SCORE:-0}" -ge "$THRESHOLD" ]; then
                      echo "pass=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "pass=false" >> "$GITHUB_OUTPUT"
                      echo "Compatibility score $SCORE is below $THRESHOLD%."
                  fi
              env:
                  SCORE: ${{ steps.meta.outputs.compatibility-score }}
                  THRESHOLD: ${{ inputs.compatibility-threshold }}

            # Metadata unavailable or gates 2/3 failed — label for human review.
            - name: Label — ${{ inputs.review-label }}
              if: |
                  steps.fast-track.conclusion == 'skipped' &&
                  (steps.gate1.outputs.pass == 'true' || steps.gate1-fallback.outputs.pass == 'true') &&
                  (steps.metadata-check.outputs.available == 'false' ||
                   steps.gate2.outputs.pass == 'false' ||
                   steps.gate3.outputs.pass == 'false')
              run: |
                  if [ "$METADATA_AVAILABLE" == "false" ]; then
                      REASON="advisory metadata (CVSS) was unavailable — failing closed"
                  elif [ "$GATE2_PASS" == "false" ]; then
                      REASON="CVSS score ($CVSS) is below the threshold of $THRESHOLD"
                  else
                      REASON="compatibility score ($COMPAT_SCORE%) is below the required $COMPAT_THRESHOLD%"
                  fi
                  TEAM_MENTION=""
                  if [ -n "$REVIEW_TEAM" ]; then
                      TEAM_MENTION=" cc @$REVIEW_TEAM"
                  fi
                  gh pr edit "$PR_URL" --add-label "$REVIEW_LABEL"
                  gh pr comment "$PR_URL" --body "This PR has been routed to the security-review path: $REASON.$TEAM_MENTION"
              env:
                  METADATA_AVAILABLE: ${{ steps.metadata-check.outputs.available }}
                  GATE2_PASS: ${{ steps.gate2.outputs.pass }}
                  CVSS: ${{ steps.cvss.outputs.value }}
                  THRESHOLD: ${{ inputs.cvss-threshold }}
                  COMPAT_SCORE: ${{ steps.meta.outputs.compatibility-score }}
                  COMPAT_THRESHOLD: ${{ inputs.compatibility-threshold }}
                  REVIEW_TEAM: ${{ inputs.review-team }}
                  REVIEW_LABEL: ${{ inputs.review-label }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # All gates cleared — label as pending for the scheduled age-gate check.
            - name: Label — ${{ inputs.pending-label }} (awaiting age gate)
              if: |
                  steps.fast-track.conclusion == 'skipped' &&
                  steps.gate2.outputs.pass == 'true' &&
                  (steps.gate3.conclusion == 'skipped' || steps.gate3.outputs.pass == 'true') &&
                  !contains(github.event.pull_request.labels.*.name, inputs.pending-label)
              run: |
                  gh pr edit "$PR_URL" --add-label "$PENDING_LABEL"
              env:
                  PENDING_LABEL: ${{ inputs.pending-label }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # Labeling step failed — notify so the failure doesn't go unnoticed.
            - name: Notify on labeling failure
              if: failure()
              run: |
                  echo "Workflow failed for PR $PR_URL"
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}

    # Runs daily. Finds PRs labelled with the pending label that have cleared
    # the age gate and enables auto-merge on them.
    scheduled-merge:
        name: Scheduled merge of eligible PRs
        runs-on: ubuntu-latest
        needs: preflight
        if: inputs.event-name == 'schedule'
        steps:
            - name: Merge PRs past age gate
              run: |
                  # Collect PR numbers first, then iterate in the main shell: a
                  # piped `while read` runs in a subshell, where FAILED would be
                  # lost and every merge failure silently reported as success.
                  PR_NUMS=$(gh pr list \
                      --repo "$GITHUB_REPOSITORY" \
                      --author "app/dependabot" \
                      --label "$PENDING_LABEL" \
                      --state open \
                      --json number,createdAt \
                  | jq -r --argjson age "$AGE_DAYS" \
                      '.[] | select(((now - (.createdAt | fromdateiso8601)) / 86400) >= $age) | .number')

                  FAILED=0
                  for PR_NUM in $PR_NUMS; do
                      echo "Enabling auto-merge on PR #$PR_NUM"
                      if ! ERR=$(gh pr merge "$PR_NUM" --auto --"$MERGE_METHOD" --repo "$GITHUB_REPOSITORY" 2>&1 >/dev/null); then
                          echo "::error::Failed to enable auto-merge on PR #$PR_NUM — $(echo "$ERR" | head -c 500 | tr '\n' ' ')"
                          FAILED=1
                      fi
                  done
                  exit $FAILED
              env:
                  PENDING_LABEL: ${{ inputs.pending-label }}
                  AGE_DAYS: ${{ inputs.age-days }}
                  MERGE_METHOD: ${{ inputs.merge-method }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
